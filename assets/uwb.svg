      <stop offset="0" stop-color="#34E0D0" stop-opacity="0.16"/>
      <stop offset="0.7" stop-color="#34E0D0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="#0f0f0f"/>
  <circle cx="400" cy="770" r="380" fill="url(#uwGlow)"/>
