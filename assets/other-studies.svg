<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <radialGradient id="osGlow" cx="50%" cy="44%" r="60%">
      <stop offset="0" stop-color="#F5A524" stop-opacity="0.16"/>
      <stop offset="0.66" stop-color="#F5A524" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="#0f0f0f"/>
  <circle cx="400" cy="450" r="370" fill="url(#osGlow)"/>
  <g stroke="#F5A524" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="750" x2="800" y2="750"/>
    <line x1="400" y1="0" x2="400" y2="1000"/>
  </g>

  <!-- stacked collection files (back -> front); top 70px of each stays visible -->
  <!-- Python -->
  <rect x="214" y="250" width="340" height="150" rx="14" fill="#F5A524" fill-opacity="0.015" stroke="#F5A524" stroke-opacity="0.32" stroke-width="1.2"/>
  <rect x="232" y="272" width="7" height="34" rx="3.5" fill="#94A3B8" fill-opacity="0.42"/>
  <text x="254" y="296" fill="#F5A524" fill-opacity="0.55" font-family="monospace" font-size="24" letter-spacing="3">Python</text>
  <!-- iOS -->
  <rect x="224" y="320" width="340" height="150" rx="14" fill="#F5A524" fill-opacity="0.02" stroke="#F5A524" stroke-opacity="0.42" stroke-width="1.3"/>
  <rect x="242" y="342" width="7" height="34" rx="3.5" fill="#94A3B8" fill-opacity="0.52"/>
  <text x="264" y="366" fill="#F5A524" fill-opacity="0.63" font-family="monospace" font-size="24" letter-spacing="3">iOS · Swift</text>
  <!-- C# -->
  <rect x="234" y="390" width="340" height="150" rx="14" fill="#F5A524" fill-opacity="0.03" stroke="#F5A524" stroke-opacity="0.54" stroke-width="1.5"/>
  <rect x="252" y="412" width="7" height="34" rx="3.5" fill="#94A3B8" fill-opacity="0.62"/>
  <text x="274" y="436" fill="#F5A524" fill-opacity="0.72" font-family="monospace" font-size="24" letter-spacing="3">C#</text>
  <!-- C++ -->
  <rect x="244" y="460" width="340" height="150" rx="14" fill="#F5A524" fill-opacity="0.04" stroke="#F5A524" stroke-opacity="0.68" stroke-width="1.6"/>
  <rect x="262" y="482" width="7" height="34" rx="3.5" fill="#94A3B8" fill-opacity="0.74"/>
  <text x="284" y="506" fill="#F5A524" fill-opacity="0.82" font-family="monospace" font-size="24" letter-spacing="3">C++</text>
  <!-- .NET Core (front, fully visible) -->
  <rect x="254" y="530" width="340" height="150" rx="14" fill="#F5A524" fill-opacity="0.06" stroke="#F5A524" stroke-opacity="0.92" stroke-width="1.9"/>
  <rect x="272" y="552" width="7" height="34" rx="3.5" fill="#94A3B8" fill-opacity="0.92"/>
  <text x="294" y="576" fill="#F5A524" fill-opacity="0.94" font-family="monospace" font-size="24" letter-spacing="3">.NET Core</text>

  <text x="56" y="852" fill="#F5A524" fill-opacity="0.6" font-family="monospace" font-size="16" letter-spacing="5">PREVIOUS COLLECTIONS</text>
  <text x="54" y="912" fill="#ffffff" fill-opacity="0.92" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="44">Other Studies</text>
</svg>
