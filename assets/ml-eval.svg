    <path d="M180 560 C 215 400, 365 270, 640 250" stroke-opacity="0.6" stroke-width="1.6"/>
  </g>
  <!-- winning ROC curve (CatBoost) -->
  <path d="M180 560 C 205 380, 350 262, 640 250" fill="none" stroke="#FF3B52" stroke-opacity="0.95" stroke-width="2.4"/>
  <!-- leaderboard -->
  <rect x="200" y="638" width="384" height="13" fill="#FF3B52" fill-opacity="0.8"/>
  <rect x="200" y="660" width="352" height="13" fill="#3D8BFF" fill-opacity="0.55"/>
  <rect x="200" y="682" width="326" height="13" fill="#3D8BFF" fill-opacity="0.5"/>
  <rect x="200" y="704" width="300" height="13" fill="#3D8BFF" fill-opacity="0.46"/>
  <rect x="200" y="726" width="270" height="13" fill="#3D8BFF" fill-opacity="0.42"/>
  <rect x="200" y="748" width="238" height="13" fill="#3D8BFF" fill-opacity="0.38"/>
  <rect x="200" y="770" width="206" height="13" fill="#3D8BFF" fill-opacity="0.34"/>
  <rect x="200" y="792" width="176" height="13" fill="#3D8BFF" fill-opacity="0.3"/>
  <line x1="200" y1="628" x2="200" y2="812" stroke="#8a8a8a" stroke-opacity="0.35" stroke-width="1.2"/>
  <g fill="#8a8a8a" font-family="monospace" font-size="12" fill-opacity="0.85">
