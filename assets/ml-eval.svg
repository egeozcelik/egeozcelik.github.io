      <stop offset="0" stop-color="#3D8BFF" stop-opacity="0.14"/>
      <stop offset="0.7" stop-color="#3D8BFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="#0f0f0f"/>
  <rect x="0" y="0" width="400" height="1000" fill="#3D8BFF" fill-opacity="0.018"/>
