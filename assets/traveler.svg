    <line x1="430" y1="612" x2="448" y2="600"/>
    <line x1="470" y1="500" x2="452" y2="492"/>
  </g>
  <!-- waypoints -->
  <g fill="#0f0f0f" stroke="#5EEAD4" stroke-opacity="0.75" stroke-width="2.2">
    <circle cx="342" cy="660" r="8"/>
    <circle cx="486" cy="574" r="8"/>
    <circle cx="492" cy="424" r="8"/>
  </g>
  <circle cx="220" cy="812" r="6" fill="#5EEAD4" fill-opacity="0.9"/>
  <!-- explore fan -> map pins -->
  <g stroke="#FF9E80" stroke-opacity="0.45" stroke-width="1.3" stroke-dasharray="2 6">
    <line x1="556" y1="348" x2="360" y2="250"/>
    <line x1="556" y1="348" x2="452" y2="212"/>
    <line x1="556" y1="348" x2="612" y2="250"/>
  </g>
  <g fill="none" stroke="#FF9E80" stroke-opacity="0.8" stroke-width="1.8">
    <path d="M360 250 a14 14 0 1 1 0.1 0 M360 264 L360 286"/>
    <path d="M452 212 a14 14 0 1 1 0.1 0 M452 226 L452 248"/>
    <path d="M612 250 a14 14 0 1 1 0.1 0 M612 264 L612 286"/>
