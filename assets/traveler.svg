    <line x1="0" y1="750" x2="800" y2="750"/>
    <line x1="400" y1="0" x2="400" y2="1000"/>
  </g>
  <!-- faint topographic rings -->
  <g fill="none" stroke="#5EEAD4" stroke-opacity="0.1" stroke-width="1.2">
    <ellipse cx="380" cy="560" rx="250" ry="210"/>
    <ellipse cx="380" cy="560" rx="160" ry="132"/>
  </g>
  <!-- GPS route polyline -->
  <path d="M 220 812 C 280 764, 306 706, 342 660 C 380 612, 460 636, 486 574 C 512 512, 452 470, 492 424 C 524 386, 590 408, 556 348" fill="none" stroke="#5EEAD4" stroke-opacity="0.72" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M 486 574 C 500 548, 470 512, 492 486" fill="none" stroke="#5EEAD4" stroke-opacity="0.35" stroke-width="1.6" stroke-dasharray="3 7"/>
