<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <radialGradient id="tvGlow" cx="42%" cy="60%" r="62%">
      <stop offset="0" stop-color="#5EEAD4" stop-opacity="0.14"/>
      <stop offset="0.7" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="#0f0f0f"/>
  <circle cx="360" cy="600" r="360" fill="url(#tvGlow)"/>
  <g stroke="#5EEAD4" stroke-opacity="0.05" stroke-width="1">
